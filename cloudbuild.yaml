substitutions:
  _IMAGE_URI: ""

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile
      - -t
      - ${_IMAGE_URI}
      - .

  # REV-158: Cloud Run へのデプロイ時に DATABASE_URL を Secret Manager から渡す（コメントアウト）
  # 現在は scripts/deploy_cloud_run.sh 側で DATABASE_URL / Cloud SQL 接続を制御する。
  # 有効化するには以下のコメントを外し、_CLOUD_RUN_SERVICE と _REGION を substitutions に追加すること。
  #
  # - name: gcr.io/google.com/cloudsdktool/cloud-sdk
  #   entrypoint: gcloud
  #   args:
  #     - run
  #     - deploy
  #     - ${_CLOUD_RUN_SERVICE}
  #     - --image=${_IMAGE_URI}
  #     - --region=${_REGION}
  #     - --set-secrets=DATABASE_URL=${_SECRET_DATABASE_URL}:latest

images:
  - "${_IMAGE_URI}"
