name: PR Checks

# PR前チェックリスト（tsc --noEmit / npm run lint）の自動化。
# eslint は必ずチェックのみ（--fix 禁止: .claude/rules/frontend.md 参照）
on:
  pull_request:
    branches: [master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: TypeScript check (tsc --noEmit)
        working-directory: frontend
        run: npx tsc --noEmit

      - name: ESLint check (no --fix)
        working-directory: frontend
        run: npm run lint

  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check (compileall)
        run: python -m compileall -q api scripts tests *.py
