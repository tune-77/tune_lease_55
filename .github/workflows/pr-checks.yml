name: PR Checks

# PR前チェックリスト（tsc --noEmit / npm run lint）の自動化。
# eslint は必ずチェックのみ（--fix 禁止: .claude/rules/frontend.md 参照）
#
# Phase 0.5（planning/shion_improvement_loop_plan.md）:
# master への直接push（Codex経由の直コミット等）はPRを経由せずCI未実行のまま
# 本番コードに入っていたため、push トリガーでも同じチェックを実行する。
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: TypeScript check (tsc --noEmit)
        working-directory: frontend
        run: npx tsc --noEmit

      - name: ESLint check (no --fix)
        working-directory: frontend
        run: npm run lint

  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check (compileall)
        run: python -m compileall -q api scripts tests *.py

  # 改善ループ＋ガードのコアテスト網。全テスト一括ではなく、クリーン環境で
  # グリーンを確認済みのスイートから段階導入する（未検証テストの偽赤でCIを
  # 止めないため）。スイートを増やすときはローカルの素の環境で通ることを確認してから追加する
  pytest-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: >
          pip install -q pytest fastapi uvicorn pydantic slowapi httpx python-multipart
          requests numpy pandas matplotlib seaborn scipy scikit-learn joblib
          python-dateutil pyyaml

      - name: Run core test suite
        run: >
          python -m pytest -q
          tests/test_no_duplicate_toplevel_defs.py
          tests/test_preflight_pr_guard.py
          tests/test_recursive_self_improvement.py
          tests/test_loop_metrics.py
          tests/test_improvement_log_recursive_summary.py
          tests/test_improvement_triage.py
          tests/test_dialogue_improvement_observability.py
          tests/test_analyze_shion_pm_quality.py
          tests/test_shion_triage_queue.py
          tests/test_shion_llm_triage_proposal.py
          tests/test_execute_codex_queue_guards.py
          tests/test_sync_cloudrun_inputs_from_gcs.py
          tests/test_lease_intelligence_dialogue.py
          tests/test_loop_hardening.py
          tests/test_codex_review_p1_p2_fixes.py
          tests/test_build_loop_proof.py
          tests/test_lease_intelligence_pending.py
          tests/test_lease_intelligence_tools.py
          tests/test_reconcile_pending_pipeline_wiring.py
          tests/test_chat_quick_fix_intake.py
          tests/test_send_daily_improvement_slack.py
          tests/test_screening_domain.py
          tests/test_threshold_single_source.py
          tests/test_emotion_history_backfill.py
          tests/test_cleanup_title_matched_closures.py
          tests/test_reconcile_needs_review_from_prs.py
          tests/test_demo_quick_ui_seed.py

  # PR前プリフライト検証ガード（AST / 幻覚import / リトライ）を warn-only で実行。
  # 対話セッション経由だけでなく、自律パイプラインが作る PR も含め全経路を対象化する。
  # ガードは stdlib のみで動くため追加依存は不要。`|| true` で CI は絶対に落とさない。
  preflight-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # resolve_base_ref() が origin/master との merge-base を要求するため全履歴取得

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Preflight guard (warn-only)
        run: |
          python scripts/preflight_pr_guard.py | tee -a "$GITHUB_STEP_SUMMARY" || true
