name: CI - ユニットテスト

# ─────────────────────────────────────────────
# トリガー: master への push / PR 作成・更新
# ─────────────────────────────────────────────
on:
  push:
    branches: [ master, main ]
    paths:
      - "**.py"
      - "**.ts"
      - "**.tsx"
      - "**.mjs"
      - "requirements*.txt"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [ master, main ]

jobs:
  # ── Python テスト ────────────────────────────────────────────────────────────
  test:
    name: pytest on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      # 1. コードを取得
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # 2. Python をセットアップ
      - name: Python ${{ matrix.python-version }} をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # 3. テスト用の最小依存ライブラリをインストール
      #    （Streamlit / Ollama / pgmpy 等はモックするので不要）
      - name: 依存ライブラリをインストール
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      # 4. 構文チェック（pyflakes）
      - name: 構文チェック
        run: |
          pip install pyflakes -q
          python -m pyflakes scoring_core.py
          python -m pyflakes rule_manager.py
          python -m pyflakes indicators.py
          python -m pyflakes credit_limit.py

      # 5. ユニットテスト実行
      - name: pytest 実行
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --color=yes

      # 6. テスト結果をサマリに表示
      - name: テスト結果サマリ
        if: always()
        run: |
          python -m pytest tests/ \
            --tb=no -q 2>&1 | tail -3

  # ── フロントエンド lint（報告のみ・自動修正禁止） ──────────────────────────
  frontend-lint:
    name: Frontend ESLint（警告のみ、ブロックしない）
    runs-on: ubuntu-latest
    # lint の警告で PR をブロックしない。あくまで情報提供として実行する。
    # ブロックしたい場合は continue-on-error: false に変更すること。
    continue-on-error: true

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: npm install
        working-directory: frontend
        run: npm ci --prefer-offline

      # --fix は絶対に実行しない。コードの自動削除・変更を防ぐ。
      # lint 結果は GitHub Actions のログとして記録されるが、CI を失敗させない。
      - name: ESLint（チェックのみ・--fix 禁止）
        working-directory: frontend
        run: |
          echo "ℹ️  ESLint を --fix なしで実行します（自動修正禁止）"
          npm run lint -- --max-warnings=9999 || true
          echo "✅  lint チェック完了（警告は上記ログを参照）"
