name: Ledger Sync

on:
  pull_request:
    types: [closed]
    branches: [master]

jobs:
  sync-ledger:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run cleanup_improvement_reviews --apply
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LEDGER_PATH: ${{ github.workspace }}/scripts/improvement_ledger.jsonl
        run: |
          python3 scripts/cleanup_improvement_reviews.py --apply

      - name: Commit updated ledger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/improvement_ledger.jsonl
          if git diff --cached --quiet; then
            echo "No ledger changes to commit"
          else
            PR_TITLE="${{ github.event.pull_request.title }}"
            PR_NUM="${{ github.event.pull_request.number }}"
            git commit -m "chore: ledger sync after PR #${PR_NUM} merge"
            git push origin master
          fi
