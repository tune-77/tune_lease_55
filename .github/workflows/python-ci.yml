name: Python CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install coverage pytest-cov

    - name: Run tests with coverage
      run: |
        python -m pytest tests/ -v --cov=scoring --cov=components --cov=. --cov-report=term-missing --cov-report=html:htmlcov --cov-report=json:coverage.json

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.json
        fail_ci_if_error: false
        verbose: true

    - name: Type check
      run: |
        mypy secret_manager.py --ignore-missing-imports

    - name: Check syntax
      run: |
        python -m py_compile tune_lease_55.py
        python -m py_compile lease_logic_sumaho12.py
        python -m py_compile secret_manager.py
        python -m py_compile ai_chat.py
        python -m py_compile slack_bot.py
        python -m py_compile anything_api.py
        find components/ -name "*.py" -exec python -m py_compile {} \;
        find scoring/ -name "*.py" -exec python -m py_compile {} \;